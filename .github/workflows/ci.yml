name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, lint, and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc and eslint's type-aware rules both need contentlayer's generated
      # types (.contentlayer/generated) to exist first. Locally this is easy
      # to miss — a leftover .contentlayer/ from a previous build masks the
      # dependency — but a fresh CI runner has nothing until this runs.
      - name: Generate Contentlayer types
        run: pnpm exec contentlayer2 build

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm exec eslint .

      - name: Build
        run: pnpm build
